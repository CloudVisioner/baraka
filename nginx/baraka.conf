server {
    server_name baraka.best www.baraka.best;

    # Upload / request body limit
    client_max_body_size 100M;

    # ─── 1. Socket.IO WebSocket ────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3003/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── 2. Backend API routes (Express) ──────────────────────────────────────
    location ~ ^/(member|product|order|event|admin|uploads)(/|$) {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── 3. React SPA — static build ──────────────────────────────────────────
    location / {
        root /home/baraka-project/baraka-react/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets — fall back to Express backend if not in React build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|webm|mp4|wav)$ {
        root /home/baraka-project/baraka-react/build;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @express_static;
    }

    location @express_static {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/baraka.best/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/baraka.best/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.baraka.best) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = baraka.best) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name baraka.best www.baraka.best;
    return 404; # managed by Certbot
}
